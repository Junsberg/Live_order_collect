<!-- React + ReactDOM + SheetJS (엑셀) CDN -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
<div id="root"><div id="loading"><div class="dot"></div><div>불러오는 중…</div></div></div>
<script>
const {
  useState,
  useEffect,
  useMemo,
  useRef
} = React;

// 브라우저 localStorage 기반 저장 어댑터 (claude.ai window.storage 대체)
if (!window.storage) {
  window.storage = {
    get: async k => {
      try {
        const v = localStorage.getItem(k);
        return v == null ? null : {
          key: k,
          value: v
        };
      } catch (e) {
        return null;
      }
    },
    set: async (k, v) => {
      try {
        localStorage.setItem(k, v);
      } catch (e) {}
      return {
        key: k,
        value: v
      };
    },
    delete: async k => {
      try {
        localStorage.removeItem(k);
      } catch (e) {}
      return {
        key: k,
        deleted: true
      };
    },
    list: async prefix => {
      const keys = [];
      try {
        for (let i = 0; i < localStorage.length; i++) {
          const kk = localStorage.key(i);
          if (!prefix || kk.startsWith(prefix)) keys.push(kk);
        }
      } catch (e) {}
      return {
        keys
      };
    }
  };
}

/* 사자마켓 라이브 주문 매니저
   흐름: ① 오늘 상품 세팅 → ② 라이브 주문 입력 → ③ 정산서 발송/입금 확인 → ④ 출고/발주서
   저장: window.storage (새로고침해도 유지) · 방송 날짜 기준 엑셀 저장 지원 */

const won = n => (n || 0).toLocaleString("ko-KR");
const uid = () => Math.random().toString(36).slice(2, 9);

// 복원용 숨김 시트
const APPDATA_SHEET = "_appdata";
const APPDATA_MAGIC = "SAJA_APPDATA_V1";
const APPDATA_CHUNK = 30000;
const todayISO = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};
const EMPTY_CUST = {
  paid: false,
  notified: false,
  addrChecked: false,
  name: "",
  phone: "",
  addr: "",
  req: "",
  memo: "",
  tracking: "",
  cashReceipt: "",
  cashIssued: false
};
const SETTLE_HEADER = `안녕하세요.
초보셀러 사자창고와 초보매니저 방송 지켜봐 주셔서 감사합니다.
1) 택배발송할 성함, 연락처, 주소 전달 부탁드립니다.
2) 입금계좌
- 국민은행 59643701008900
- 김상태(디스카운트미로미사점)
3) 현금영수증
- 필요하신 경우 현금현수증 발행 연락처도 같이 남겨주세요.`;
function App() {
  const [tab, setTab] = useState("order");
  const [loaded, setLoaded] = useState(false);
  const [products, setProducts] = useState([]);
  const [orders, setOrders] = useState([]);
  const [customers, setCustomers] = useState({});
  const [shipFee, setShipFee] = useState(4000);
  const [bdate, setBdate] = useState(todayISO());
  const [pickState, setPickState] = useState({});
  const [nick, setNick] = useState("");
  const [pName, setPName] = useState("");
  const [pPrice, setPPrice] = useState("");
  const [copiedId, setCopiedId] = useState(null);
  const [settleSearch, setSettleSearch] = useState("");
  const [settleHeader, setSettleHeader] = useState(SETTLE_HEADER);
  const [openMsg, setOpenMsg] = useState({});
  const [openCash, setOpenCash] = useState({});
  const [openMemo, setOpenMemo] = useState({});
  const fileRef = useRef(null);
  const shipFileRef = useRef(null);
  const [shipData, setShipData] = useState([]);
  const [shipSearch, setShipSearch] = useState("");
  const [toast, setToast] = useState("");
  const showToast = msg => {
    setToast(msg);
    window.clearTimeout(showToast._t);
    showToast._t = window.setTimeout(() => setToast(""), 5000);
  };
  const [resetArm, setResetArm] = useState(false);
  const [resetAllArm, setResetAllArm] = useState(false);
  const [openCust, setOpenCust] = useState({});
  const nickRef = useRef(null);
  const [manualOpen, setManualOpen] = useState(false);
  const [mName, setMName] = useState("");
  const [mPrice, setMPrice] = useState("");
  const [mQty, setMQty] = useState("1");
  const [printMode, setPrintMode] = useState(false);

  /* ---------- 저장/불러오기 ---------- */
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("saja:session");
        if (r && r.value) {
          const d = JSON.parse(r.value);
          setProducts(d.products || []);
          setOrders(d.orders || []);
          setCustomers(d.customers || {});
          setShipFee(typeof d.shipFee === "number" ? d.shipFee : 4000);
          setBdate(d.bdate || todayISO());
          setPickState(d.pickState || {});
          setSettleHeader(d.settleHeader || SETTLE_HEADER);
          setShipData(d.shipData || []);
        }
      } catch (e) {/* 첫 실행 */}
      setLoaded(true);
    })();
  }, []);
  useEffect(() => {
    if (!loaded) return;
    const t = setTimeout(() => {
      window.storage.set("saja:session", JSON.stringify({
        products,
        orders,
        customers,
        shipFee,
        bdate,
        pickState,
        settleHeader,
        shipData
      })).catch(() => {});
    }, 400);
    return () => clearTimeout(t);
  }, [products, orders, customers, shipFee, bdate, pickState, settleHeader, shipData, loaded]);

  // 인쇄 종료(취소·완료) 시 인쇄 모드 해제
  useEffect(() => {
    const done = () => setPrintMode(false);
    window.addEventListener("afterprint", done);
    return () => window.removeEventListener("afterprint", done);
  }, []);

  /* ---------- 파생 데이터 ---------- */
  const activeOrders = useMemo(() => orders.filter(o => !o.canceled), [orders]);
  const totalSales = useMemo(() => activeOrders.reduce((s, o) => s + o.price * o.qty, 0), [activeOrders]);
  const paidSales = useMemo(() => activeOrders.reduce((s, o) => s + (customers[o.nick] && customers[o.nick].paid ? o.price * o.qty : 0), 0), [activeOrders, customers]);
  const nickList = useMemo(() => {
    const s = [];
    orders.forEach(o => {
      if (!s.includes(o.nick)) s.push(o.nick);
    });
    return s;
  }, [orders]);
  const byNick = useMemo(() => {
    const m = {};
    activeOrders.forEach(o => {
      (m[o.nick] = m[o.nick] || []).push(o);
    });
    return m;
  }, [activeOrders]);
  const paidCount = nickList.filter(n => customers[n] && customers[n].paid).length;
  const dateCode = bdate.replace(/-/g, "");
  const cust = n => customers[n] || EMPTY_CUST;
  const setCust = (n, patch) => setCustomers(c => ({
    ...c,
    [n]: {
      ...EMPTY_CUST,
      ...(c[n] || {}),
      ...patch
    }
  }));

  /* ---------- 상품 ---------- */
  const addProduct = () => {
    const name = pName.trim();
    const price = parseInt(pPrice, 10);
    if (!name || isNaN(price)) return;
    setProducts(p => [...p, {
      id: uid(),
      name,
      price
    }]);
    setPName("");
    setPPrice("");
  };
  const loadPrev = async () => {
    try {
      const r = await window.storage.get("saja:lastProducts");
      if (r && r.value) {
        const prev = JSON.parse(r.value);
        setProducts(p => {
          const names = p.map(x => x.name);
          return [...p, ...prev.filter(x => !names.includes(x.name)).map(x => ({
            ...x,
            id: uid()
          }))];
        });
      } else showToast("저장된 이전 방송 목록이 없습니다.");
    } catch (e) {
      showToast("저장된 이전 방송 목록이 없습니다.");
    }
  };
  const newSession = async () => {
    if (!resetArm) {
      setResetArm(true);
      setResetAllArm(false);
      setTimeout(() => setResetArm(false), 3000);
      return;
    }
    try {
      if (products.length) await window.storage.set("saja:lastProducts", JSON.stringify(products));
    } catch (e) {}
    setOrders([]);
    setCustomers({});
    setNick("");
    setResetArm(false);
    setBdate(todayISO());
    setPickState({});
    setShipData([]);
    setShipSearch("");
  };
  const newSessionAll = async () => {
    if (!resetAllArm) {
      setResetAllArm(true);
      setResetArm(false);
      setTimeout(() => setResetAllArm(false), 3000);
      return;
    }
    try {
      if (products.length) await window.storage.set("saja:lastProducts", JSON.stringify(products));
    } catch (e) {}
    setProducts([]);
    setOrders([]);
    setCustomers({});
    setNick("");
    setResetAllArm(false);
    setBdate(todayISO());
    setPickState({});
    setShipData([]);
    setShipSearch("");
  };

  /* ---------- 주문 ---------- */
  const tapProduct = p => {
    const n = nick.trim();
    if (!n) {
      nickRef.current && nickRef.current.focus();
      return;
    }
    setOrders(os => {
      const i = os.findIndex(o => o.nick === n && o.name === p.name && o.price === p.price && !o.canceled);
      if (i >= 0) {
        const cp = [...os];
        cp[i] = {
          ...cp[i],
          qty: cp[i].qty + 1
        };
        return cp;
      }
      return [...os, {
        id: uid(),
        nick: n,
        name: p.name,
        price: p.price,
        qty: 1,
        canceled: false,
        ts: Date.now()
      }];
    });
    if (!customers[n]) setCust(n, {});
  };
  // 직접입력: 목록에 없는 상품(서비스 등)을 임의 이름·금액·수량으로 추가
  const addManualOrder = ({
    name,
    price,
    qty
  }) => {
    const n = nick.trim();
    if (!n) {
      nickRef.current && nickRef.current.focus();
      return;
    }
    const nm = (name || "").trim();
    if (!nm) return;
    setOrders(os => [...os, {
      id: uid(),
      nick: n,
      name: nm,
      price: parseInt(price, 10) || 0,
      qty: Math.max(1, parseInt(qty, 10) || 1),
      canceled: false,
      ts: Date.now()
    }]);
    if (!customers[n]) setCust(n, {});
  };
  const chgQty = (id, d) => setOrders(os => os.map(o => o.id === id ? {
    ...o,
    qty: Math.max(1, o.qty + d)
  } : o));
  const toggleCancel = id => setOrders(os => os.map(o => o.id === id ? {
    ...o,
    canceled: !o.canceled
  } : o));
  const delOrder = id => setOrders(os => os.filter(o => o.id !== id));

  /* ---------- 정산 ---------- */
  const settleMsg = n => {
    const list = byNick[n] || [];
    const sum = list.reduce((s, o) => s + o.price * o.qty, 0);
    const lines = list.map(o => `${o.name}_${o.qty}개*${o.price}원=${o.price * o.qty}원`);
    return `${settleHeader}\n\n<정산서>\n주문하신 상품과 수량이 맞는지 확인 부탁드립니다.\n${lines.join("\n")}\n총 합계 금액은 ${won(sum)}원+합배송비 ${won(shipFee)}원 = ${won(sum + shipFee)}원 입니다.`;
  };
  const copyText = async (text, id, n) => {
    try {
      await navigator.clipboard.writeText(text);
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
    }
    setCopiedId(id);
    if (n) setCust(n, {
      notified: true
    });
    setTimeout(() => setCopiedId(null), 1500);
  };

  /* ---------- 출고 ---------- */
  const pivot = useMemo(() => {
    const m = {};
    activeOrders.forEach(o => {
      const paid = cust(o.nick).paid;
      m[o.name] = m[o.name] || {
        paid: 0,
        unpaid: 0
      };
      m[o.name][paid ? "paid" : "unpaid"] += o.qty;
    });
    return m;
  }, [activeOrders, customers]);
  const paidLines = useMemo(() => activeOrders.filter(o => cust(o.nick).paid), [activeOrders, customers]);

  // 창고 픽업: 상품명 가나다순 정렬 + 총 픽업 수량
  const pickupList = useMemo(() => Object.entries(pivot).sort((a, b) => a[0].localeCompare(b[0], "ko")), [pivot]);
  const totalPickupQty = useMemo(() => Object.values(pivot).reduce((s, v) => s + v.paid + v.unpaid, 0), [pivot]);
  const totalUnpaidQty = useMemo(() => Object.values(pivot).reduce((s, v) => s + v.unpaid, 0), [pivot]);
  const pickedKinds = pickupList.filter(([n]) => pickState[n]).length;
  const togglePick = name => setPickState(s => ({
    ...s,
    [name]: !s[name]
  }));

  // 현금영수증 번호를 입력한 사람만
  const cashList = useMemo(() => nickList.filter(n => (cust(n).cashReceipt || "").trim()), [nickList, customers]);
  const cashIssuedCount = cashList.filter(n => cust(n).cashIssued).length;

  // 4. 송장출력_복사용(롯데) 시트 생성 — 원본 양식 그대로(A~R), 빈 컬럼도 헤더 유지, 수식 없이 값만
  const buildShipSheet = () => {
    // 업로드 탭에서 반영된 송장번호(닉네임 → 송장번호)
    const trackByNick = {};
    shipData.forEach(d => {
      if (d.tracking) trackByNick[d.nick] = d.tracking;
    });
    const rows = [["이름", "전화번호", "휴대폰번호", "우편번호", "주소", "상품명", "옵션명", "추가구성", "수량", "주문번호", "운임구분", "배송시요구사항", "송장번호", "주문처", "보내는분", "전화번호", "운임", "송장번호"]];
    paidLines.forEach(o => {
      const c = cust(o.nick);
      const trk = trackByNick[o.nick] || c.tracking || "";
      rows.push([c.name || o.nick,
      // A 이름
      c.phone || "",
      // B 전화번호
      null,
      // C 휴대폰번호 (완전 공란 · 원본과 동일)
      "",
      // D 우편번호 (빈 컬럼 유지)
      c.addr || "",
      // E 주소
      `${o.name}_${o.qty}개`,
      // F 상품명
      "",
      // G 옵션명 (빈 컬럼 유지)
      "",
      // H 추가구성 (빈 컬럼 유지)
      o.qty,
      // I 수량
      o.nick,
      // J 주문번호(닉네임)
      "신용",
      // K 운임구분 — 고정값
      c.req || "",
      // L 배송시요구사항
      "",
      // M 송장번호 (빈 컬럼 유지)
      "사자창고",
      // N 주문처 — 고정값
      "사자창고",
      // O 보내는분 — 고정값
      "02-561-7000",
      // P 전화번호 — 고정값
      "",
      // Q 운임 (빈 컬럼 유지)
      trk // R 송장번호 — 업로드 반영값 우선
      ]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = [{
      wch: 10
    }, {
      wch: 14
    }, {
      wch: 14
    }, {
      wch: 8
    }, {
      wch: 40
    }, {
      wch: 28
    }, {
      wch: 8
    }, {
      wch: 8
    }, {
      wch: 6
    }, {
      wch: 12
    }, {
      wch: 8
    }, {
      wch: 16
    }, {
      wch: 14
    }, {
      wch: 10
    }, {
      wch: 10
    }, {
      wch: 14
    }, {
      wch: 8
    }, {
      wch: 16
    }];
    return ws;
  };

  // 출고 탭 전용: 송장 시트 1개만 담긴 엑셀 다운로드
  const exportShipXlsx = () => {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, buildShipSheet(), "4. 송장출력_복사용(롯데)");
    XLSX.writeFile(wb, `사자창고_출고_${dateCode}.xlsx`);
  };

  // 입금 완료자별 상품 리스트 A4 인쇄 (CJ대한통운 등 · 포장 피킹용)
  const printPickList = () => {
    if (paidLines.length === 0) {
      showToast("입금 완료된 주문이 없습니다. ③ 정산에서 「입금」을 체크하세요.");
      return;
    }
    setPrintMode(true);
  };

  // 전체 상태를 숨김 시트로 저장 (불러오기 복원용)
  const appendAppData = wb => {
    const payload = JSON.stringify({
      v: 1,
      products,
      orders,
      customers,
      shipFee,
      bdate,
      pickState,
      settleHeader,
      shipData
    });
    const rows = [[APPDATA_MAGIC]];
    for (let i = 0; i < payload.length; i += APPDATA_CHUNK) rows.push([payload.slice(i, i + APPDATA_CHUNK)]);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), APPDATA_SHEET);
    if (!wb.Workbook) wb.Workbook = {};
    if (!wb.Workbook.Sheets) wb.Workbook.Sheets = [];
    const idx = wb.SheetNames.indexOf(APPDATA_SHEET);
    for (let i = 0; i <= idx; i++) if (!wb.Workbook.Sheets[i]) wb.Workbook.Sheets[i] = {};
    wb.Workbook.Sheets[idx].Hidden = 1; // 숨김 시트 (인쇄·업로드 영향 없음)
  };

  // 상태 일괄 적용 (복원/파싱 공통)
  const applyImported = d => {
    setProducts(d.products || []);
    setOrders(d.orders || []);
    setCustomers(d.customers || {});
    setShipFee(typeof d.shipFee === "number" ? d.shipFee : 4000);
    setBdate(d.bdate || todayISO());
    setPickState(d.pickState || {});
    if (d.settleHeader) setSettleHeader(d.settleHeader);
    setShipData(d.shipData || []);
    setNick("");
    setSettleSearch("");
  };

  // 엑셀 불러오기 — 앱이 저장한 파일(_appdata 숨김 시트) 복원
  const importXlsx = async file => {
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {
        type: "array"
      });
      const ws = wb.Sheets[APPDATA_SHEET];
      if (ws) {
        const aoa = XLSX.utils.sheet_to_json(ws, {
          header: 1
        });
        if (aoa.length && aoa[0][0] === APPDATA_MAGIC) {
          const d = JSON.parse(aoa.slice(1).map(r => r && r[0] || "").join(""));
          applyImported(d);
          showToast(`✓ ${d.bdate || ""} 데이터를 불러왔습니다.`);
          return;
