// 브라우저 localStorage 기반 저장 어댑터 (claude.ai window.storage 대체)
if (!window.storage) {
  window.storage = {
    get: async k => {
      try {
        const v = localStorage.getItem(k);
        return v == null ? null : {
          key: k,
          value: v
        };
      } catch (e) {
        return null;
      }
    },
    set: async (k, v) => {
      try {
        localStorage.setItem(k, v);
      } catch (e) {}
      return {
        key: k,
        value: v
      };
    },
    delete: async k => {
      try {
        localStorage.removeItem(k);
      } catch (e) {}
      return {
        key: k,
        deleted: true
      };
    },
    list: async prefix => {
      const keys = [];
      try {
        for (let i = 0; i < localStorage.length; i++) {
          const kk = localStorage.key(i);
          if (!prefix || kk.startsWith(prefix)) keys.push(kk);
        }
      } catch (e) {}
      return {
        keys
      };
    }
  };
}

/* 사자마켓 라이브 주문 매니저
   흐름: ① 오늘 상품 세팅 → ② 라이브 주문 입력 → ③ 정산서 발송/입금 확인 → ④ 출고/발주서
   저장: window.storage (새로고침해도 유지) · 방송 날짜 기준 엑셀 저장 지원 */

// 편집용: 옵션 그룹(값에 _id 포함)을 조합으로 전개 — 수정 시 기존 주문 매칭에 id 사용(이름 변경에도 안전)
const expandGroupsWithIds = (base, groups) => {
  const gs = (groups || []).map(g => (g.values || []).filter(v => (v.name || "").trim())).filter(vs => vs.length);
  if (!base || !gs.length) return [];
  let combos = [[]];
  gs.forEach(vs => {
    const next = [];
    combos.forEach(c => vs.forEach(v => next.push([...c, v])));
    combos = next;
  });
  return combos.map(vals => ({
    name: base.trim() + " " + vals.map(v => (v.name || "").trim()).join(" "),
    price: vals.reduce((s, v) => s + (parseInt(v.price, 10) || 0), 0),
    idKey: vals.map(v => v._id).join("|")
  }));
};
const won = n => (n || 0).toLocaleString("ko-KR");

// 타임스탬프 → "오후 3:24" 형태 (불러온 파일 표기용)

    return new Date(ts).toLocaleTimeString("ko-KR", {
      hour: "numeric",
      minute: "2-digit"

    return "";

};

// 옵션 상품을 변형 조합으로 전개. 단순 상품은 그대로 1개. (엑셀 참조목록·재고 등에서 사용)
const COMBO_SEP = "\u241f"; // 조합 재고 키 구분자 (이름에 안 쓰이는 문자)
const expandProduct = p => {
  if (!p.options || !p.options.length) return [{
    name: p.name,
    price: p.price,
    key: null,
    names: []
  }];
  let combos = [[]];
  p.options.forEach(g => {
    const vs = (g.values || []).filter(v => v && (v.name || "").trim());
    if (!vs.length) return;
    const next = [];
    combos.forEach(c => vs.forEach(v => next.push([...c, v])));
    combos = next;
  });
  return combos.map(vals => ({
    names: vals.map(v => v.name),
    key: vals.map(v => v.name).join(COMBO_SEP),
    name: p.name + " " + vals.map(v => v.name).join(" "),
    price: (p.price || 0) + vals.reduce((s, v) => s + (v.price || 0), 0)
  }));
};

  // 상품 드래그 정렬 (포인터 이벤트: 마우스+터치 통합, 손잡이 ≡ 로만 시작)
  const onDragStart = (e, id) => {
    e.preventDefault();
    dragRef.current.id = id;
    setDragId(id);
    try {
      e.currentTarget.setPointerCapture(e.pointerId);
    } catch (err) {}
  };
  const onDragMove = e => {
    const from = dragRef.current.id;
    if (from == null) return;
    e.preventDefault();
    const rows = Array.from(document.querySelectorAll("[data-prow]"));
    let targetId = null;
    for (const r of rows) {
      const rect = r.getBoundingClientRect();
      if (e.clientY < rect.top + rect.height / 2) {
        targetId = r.getAttribute("data-prow");
        break;
      }
    }
    if (targetId === from) return;
    setProducts(ps => {
      const fi = ps.findIndex(x => x.id === from);
      if (fi < 0) return ps;
      const arr = ps.slice();
      const [moved] = arr.splice(fi, 1);
      let at = targetId == null ? arr.length : arr.findIndex(x => x.id === targetId);
      if (at < 0) at = arr.length;
      arr.splice(at, 0, moved);
      if (arr.every((x, i) => x.id === ps[i].id)) return ps;
      return arr;
    });
  };
  const onDragEnd = e => {
    dragRef.current.id = null;
    setDragId(null);
    try {
      e.currentTarget.releasePointerCapture(e.pointerId);

  const [manualOpen, setManualOpen] = useState(false);

  // 인트로 스플래시: 2.4초 표시 → 0.7초 페이드아웃 → 제거

      })).catch(() => {});

  // 불러온 파일명은 세션 데이터와 별도 키로 보관 (엑셀 저장 payload에는 미포함)
  useEffect(() => {
    if (!loaded) return;

      if (loadedFile) window.storage.set("saja:loadedFile", JSON.stringify(loadedFile)).catch(() => {});else window.storage.delete("saja:loadedFile").catch(() => {});
    } catch (e) {}
  }, [loadedFile, loaded]);

  // 인쇄 종료(취소·완료) 시 인쇄 모드 해제
  useEffect(() => {
    const done = () => setPrintMode(false);
    window.addEventListener("afterprint", done);
    return () => window.removeEventListener("afterprint", done);
  }, []);

  // 옵션 상품 드릴다운 중 그 상품이 사라지면 선택 취소
  useEffect(() => {
    if (pick && !products.find(p => p.id === pick.productId)) setPick(null);
  }, [pick, products]);

  /* ---------- 파생 데이터 ---------- */
  const activeOrders = useMemo(() => orders.filter(o => !o.canceled), [orders]);
  const totalSales = useMemo(() => activeOrders.reduce((s, o) => s + o.price * o.qty, 0), [activeOrders]);
  const paidSales = useMemo(() => activeOrders.reduce((s, o) => s + (customers[o.nick] && customers[o.nick].paid ? o.price * o.qty : 0), 0), [activeOrders, customers]);
  const orderNickCount = useMemo(() => new Set(activeOrders.map(o => o.nick)).size, [activeOrders]);
  const paidNickCount = useMemo(() => new Set(activeOrders.filter(o => customers[o.nick] && customers[o.nick].paid).map(o => o.nick)).size, [activeOrders, customers]);
  const totalWithShip = totalSales + orderNickCount * shipFee;
  const paidWithShip = paidSales + paidNickCount * shipFee;
  const nickList = useMemo(() => {
    const s = [];
    orders.forEach(o => {
      if (!s.includes(o.nick)) s.push(o.nick);
    });
    return s;
  }, [orders]);
  const byNick = useMemo(() => {
    const m = {};
    activeOrders.forEach(o => {
      (m[o.nick] = m[o.nick] || []).push(o);
    });
    return m;
  }, [activeOrders]);
  const nickSummary = useMemo(() => {
    const m = {};
    orders.forEach(o => {
      const e = m[o.nick] || (m[o.nick] = {
        nick: o.nick,
        total: 0,
        lastTs: 0,
        active: 0
      });
      e.lastTs = Math.max(e.lastTs, o.ts || 0);
      if (!o.canceled) {
        e.total += o.price * o.qty;
        e.active += 1;
      }
    });
    return Object.values(m).sort((a, b) => b.lastTs - a.lastTs);
  }, [orders]);
  // 옵션 조합 상품 미리보기 (데카르트 곱, 가격=값 가격 합산)
  const optVariants = useMemo(() => {
    const base = optName.trim();
    const groups = optGroups.map(g => g.values.filter(v => v.name.trim())).filter(vs => vs.length > 0);
    if (!base || groups.length === 0) return [];
    let combos = [[]];
    groups.forEach(vs => {
      const next = [];
      combos.forEach(c => vs.forEach(v => next.push([...c, v])));
      combos = next;
    });
    return combos.map(vals => ({
      key: vals.map(v => v.name.trim()).join(COMBO_SEP),
      name: base + " " + vals.map(v => v.name.trim()).join(" "),
      price: vals.reduce((s, v) => s + (parseInt(v.price, 10) || 0), 0)
    }));
  }, [optName, optGroups]);
  const paidCount = nickList.filter(n => customers[n] && customers[n].paid).length;
  const dateCode = bdate.replace(/-/g, "");
  const cust = n => customers[n] || EMPTY_CUST;
  const setCust = (n, patch) => setCustomers(c => ({
    ...c,
    [n]: {
      ...EMPTY_CUST,
      ...(c[n] || {}),
      ...patch
    }
  }));

  /* ---------- 상품 ---------- */
  const addProduct = () => {
    const name = pName.trim();
    const price = parseInt(pPrice, 10);
    if (!name || isNaN(price)) return;
    const stock = pStock.trim() === "" ? null : Math.max(0, parseInt(pStock, 10) || 0);
    setProducts(p => [...p, {
      id: uid(),
      name,
      price,
      stock

    setPName("");
    setPPrice("");
    setPStock("");

  // 옵션 생성기 핸들러

      price: "",
      _id: uid()
    }, {
      name: "",
      price: "",
      _id: uid()
    }]
  }]);
  const optRemoveGroup = gi => setOptGroups(g => g.length <= 1 ? g : g.filter((_, i) => i !== gi));
  const optSetGroupLabel = (gi, label) => setOptGroups(g => g.map((grp, i) => i === gi ? {
    ...grp,
    label
  } : grp));
  const optAddValue = gi => setOptGroups(g => g.map((grp, i) => i === gi ? {
    ...grp,
    values: [...grp.values, {
      name: "",
      price: "",
      _id: uid()
    }]
  } : grp));
  const optRemoveValue = (gi, vi) => setOptGroups(g => g.map((grp, i) => i === gi ? {
    ...grp,
    values: grp.values.filter((_, j) => j !== vi)
  } : grp));

    ...grp,

  } : grp));
  const optReset = () => {

      label: "",
      values: [{
        name: "",
        price: "",
        _id: uid()
      }, {
        name: "",
        price: "",
        _id: uid()
      }]

    setOptStocks({});
    setOptEditId(null);
    setOptOldMap({});
  };
  // 옵션 상품 수정 열기 (기존 값 채워넣기 + 각 값에 내부 id 부여 + 옛조합 매핑 기록)
  const openEditOption = p => {
    const groups = (p.options || []).map(g => ({
      label: g.label || "",
      values: (g.values || []).map(v => ({
        name: v.name,
        price: v.price ? String(v.price) : "",
        _id: uid()
      }))
    }));
    const oldMap = {};
    expandGroupsWithIds(p.name, groups).forEach(c => {
      oldMap[c.name] = c.idKey;
    });
    setOptOldMap(oldMap);
    setOptName(p.name);
    setOptGroups(groups);
    setOptStocks(Object.fromEntries(Object.entries(p.stocks || {}).map(([k, v]) => [k, String(v)])));
    setOptEditId(p.id);
    setOptOpen(true);
  };
  const generateVariants = () => {
    const base = optName.trim();
    const groups = optGroups.map(g => ({
      label: g.label.trim(),
      values: g.values.filter(v => v.name.trim()).map(v => ({
        name: v.name.trim(),
        price: parseInt(v.price, 10) || 0
      }))
    })).filter(g => g.values.length > 0);
    if (!base || groups.length === 0) {
      showToast("상품명과 옵션값을 입력하세요");
      return;
    }
    // 이름 중복 검사 (수정 중인 자기 자신은 제외)
    if (products.some(p => p.name === base && p.id !== optEditId)) {
      showToast(`"${base}" 상품이 이미 있습니다`);
      return;
    }
    // 조합별 재고 맵 (현재 유효 조합 키만, 빈 값은 무제한)
    const validKeys = new Set(optVariants.map(v => v.key));
    const stocks = {};
    Object.entries(optStocks).forEach(([k, v]) => {
      const s = (v == null ? "" : String(v)).trim();
      if (validKeys.has(k) && s !== "") stocks[k] = Math.max(0, parseInt(s, 10) || 0);
    });
    if (optEditId) {
      const newByIdKey = {};
      expandGroupsWithIds(base, optGroups).forEach(c => {
        newByIdKey[c.idKey] = {
          name: c.name,
          price: c.price
        };
      });
      setOrders(os => os.map(o => {
        if (o.productId !== optEditId) return o;
        const idKey = optOldMap[o.name];
        if (idKey == null) return o;
        const nu = newByIdKey[idKey];
        if (!nu) return o;
        return {
          ...o,
          name: nu.name,
          price: nu.price
        };
      }));
      setProducts(ps => ps.map(p => p.id === optEditId ? {
        ...p,
        name: base,
        price: 0,
        options: groups,
        stocks
      } : p));
      showToast(`옵션 상품 "${base}" 수정됨 · 기존 주문도 정정`);
    } else {
      setProducts(ps => [...ps, {
        id: uid(),
        name: base,
        price: 0,
        stock: null,
        options: groups,
        stocks
      }]);
      showToast(`옵션 상품 "${base}" 추가 · ${optVariants.length}개 조합`);
    }
    optReset();
    setOptOpen(false);
  };
  const loadPrev = async () => {
    try {
      const r = await window.storage.get("saja:lastProducts");
      if (r && r.value) {
        const prev = JSON.parse(r.value);
        setProducts(p => {
          const names = p.map(x => x.name);
          return [...p, ...prev.filter(x => !names.includes(x.name)).map(x => ({
            ...x,
            id: uid()
          }))];
        });
      } else showToast("저장된 이전 방송 목록이 없습니다.");
    } catch (e) {
      showToast("저장된 이전 방송 목록이 없습니다.");
    }
  };
  const resetTransient = () => {
    setShipData([]);
    setShipSearch("");
    setShipSelectMode(false);
    setShipSelected({});
    setMemoOnly(false);
    setKeepOnly(false);
    setUnpaidOnly(false);
    setPaidOnly(false);
    setSettleSearch("");
    setRecentId(null);
  };
  const newSession = async () => {
    if (!resetArm) {
      setResetArm(true);
      setResetAllArm(false);
      setTimeout(() => setResetArm(false), 3000);
      return;
    }
    try {
      if (products.length) await window.storage.set("saja:lastProducts", JSON.stringify(products));
    } catch (e) {}
    setOrders([]);
    setCustomers({});
    setNick("");
    setResetArm(false);
    setBdate(todayISO());
    setPickState({});
    setLoadedFile(null);
    resetTransient();
  };
  const newSessionAll = async () => {
    if (!resetAllArm) {
      setResetAllArm(true);
      setResetArm(false);
      setTimeout(() => setResetAllArm(false), 3000);
      return;
    }
    try {
      if (products.length) await window.storage.set("saja:lastProducts", JSON.stringify(products));
    } catch (e) {}
    setProducts([]);
    setOrders([]);
    setCustomers({});
    setNick("");
    setResetAllArm(false);
    setBdate(todayISO());
    setPickState({});
    setLoadedFile(null);
    resetTransient();
  };

  /* ---------- 주문 ---------- */
  const tapProduct = p => addResolvedOrder(p.id, p.name, p.price);
  // 주문 추가 코어 (이름·금액 확정본). 옵션 상품 드릴다운도 이걸 사용.
  const addResolvedOrder = (productId, name, price) => {
    const n = nick.trim();
    if (!n) {
      nickRef.current && nickRef.current.focus();
      return;
    }
    const existing = orders.find(o => o.nick === n && o.name === name && o.price === price && !o.canceled);
    const rid = existing ? existing.id : uid();
    setOrders(os => {
      const i = os.findIndex(o => o.nick === n && o.name === name && o.price === price && !o.canceled);
      if (i >= 0) {
        const cp = [...os];
        cp[i] = {
          ...cp[i],
          qty: cp[i].qty + 1
        };
        return cp;
      }
      return [...os, {
        id: rid,
        productId,
        nick: n,
        name,
        price,
        qty: 1,
        canceled: false,
        ts: Date.now()
      }];
    });
    flashRecent(rid);
    if (!customers[n]) setCust(n, {});
  };
  // 옵션 상품 드릴다운: 값 하나 선택
  const choosePickValue = (prod, value) => {
    const chosen = [...pick.chosen, value];
    if (chosen.length >= prod.options.length) {
      const name = prod.name + " " + chosen.map(c => c.name).join(" ");
      const price = (prod.price || 0) + chosen.reduce((s, c) => s + (c.price || 0), 0);
      addResolvedOrder(prod.id, name, price);
      showToast(`${name} 추가`);
      setPick(null);
    } else {
      setPick({
        ...pick,
        chosen
      });
    }
  };
  // 직접입력: 목록에 없는 상품(서비스 등)을 임의 이름·금액·수량으로 추가
  const addManualOrder = ({
    name,
    price,
    qty
  }) => {
    const n = nick.trim();
    if (!n) {
      nickRef.current && nickRef.current.focus();
      return;
    }
    const nm = (name || "").trim();
    if (!nm) return;
    const rid = uid();
    setOrders(os => [...os, {
      id: rid,
      nick: n,
      name: nm,
      price: parseInt(price, 10) || 0,
      qty: Math.max(1, parseInt(qty, 10) || 1),
      canceled: false,
      ts: Date.now()
    }]);
    flashRecent(rid);
    if (!customers[n]) setCust(n, {});
  };
  const chgQty = (id, d) => setOrders(os => os.map(o => o.id === id ? {
    ...o,
    qty: Math.max(1, o.qty + d)
  } : o));
  const toggleCancel = id => setOrders(os => os.map(o => o.id === id ? {
    ...o,
    canceled: !o.canceled
  } : o));
  const delOrder = id => setOrders(os => os.filter(o => o.id !== id));
  // 전체주문(닉네임별)에서 그 사람 주문 전체 삭제 — 실수 방지 2단 탭
  const delNickOrders = n => {
    if (delNickArm !== n) {

  // 닉네임 변경 — 주문·고객정보·송장조회 전부 반영 (픽업체크는 상품명 키라 무관)

      return false;

    setOrders(os => os.map(o => o.nick === oldNick ? {
      ...o,
      nick: nn
    } : o));
    setCustomers(c => {
      if (!c[oldNick]) return c;
      const {
        [oldNick]: mv,
        ...rest
      } = c;
      return {

    });

      ...d,

  const exportShipXlsx = () => {

  // CJ대한통운 출고 시트 — 입금완료자별 1행(합포장이라 수량 무관 대표 1개)

  const exportCjXlsx = () => {

  // 입금 완료자별 상품 리스트 A4 인쇄 (CJ대한통운 등 · 포장 피킹용)

      v: 1,

      orders,
      customers,
      shipFee,
      bdate,
      pickState,
      settleHeader,
      shipData
    });

    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), APPDATA_SHEET);

  // 상태 일괄 적용 (복원/파싱 공통)
  const applyImported = d => {

  // 엑셀 불러오기 — 앱이 저장한 파일(_appdata 숨김 시트) 복원
  const importXlsx = async file => {

        type: "array"
      });

      if (ws) {
        const aoa = XLSX.utils.sheet_to_json(ws, {

        });

          const d = JSON.parse(aoa.slice(1).map(r => r && r[0] || "").join(""));

            name: file.name || "",

          });

  // 5. 업로드 — 송장번호 채운 출고 파일에서 고객별 운송장 조회
  const parseShipUpload = wb => {
    const ws = wb.Sheets["4. 송장출력_복사용(롯데)"];
    if (!ws) return null;
    const clean = s => s === "#N/A" || s === "#REF!" || s === "0" ? "" : s;
    const V = c => {
      const x = ws[c];
      return x == null ? "" : String(x.v == null ? "" : x.v).trim();
    };
    const cell = (r, c) => XLSX.utils.encode_cell({
      r,
      c
    });
    const ref = XLSX.utils.decode_range(ws["!ref"]);
    const map = {};
    for (let r = 1; r <= ref.e.r; r++) {
      const nick = V(cell(r, 9)); // J열 주문번호(닉네임)
      if (!nick || nick === "0" || nick.startsWith("#")) continue; // 빈행·오류행 제외
      const tracking = clean(V(cell(r, 17))); // R열 송장번호
      if (!map[nick]) {
        map[nick] = {
          nick,
          name: clean(V(cell(r, 0))),
          phone: clean(V(cell(r, 1))),
          addr: clean(V(cell(r, 4))),
          tracking,
          carrier: tracking ? "롯데택배" : ""
        };
      } else if (tracking && !map[nick].tracking) {
        map[nick].tracking = tracking;
        map[nick].carrier = "롯데택배";
      }
    }
    return Object.values(map);
  };

  // CJ대한통운 운송장 출력 파일 파싱 (Sheet1)
  // 닉네임: X열(배송메세지1)의 "닉네임//요청"에서 // 앞부분 우선, 없으면 P열(고객주문번호)
  // 운송장·택배사만 파일에서 가져오고, 이름·연락처·주소는 앱 출고 데이터 사용 (CJ 파일은 마스킹됨)
  const parseCjUpload = wb => {
    const ws = wb.Sheets["Sheet1"];
    if (!ws) return null;
    const clean = s => s === "#N/A" || s === "#REF!" || s === "0" ? "" : s;
    const V = c => {
      const x = ws[c];
      return x == null ? "" : String(x.v == null ? "" : x.v).trim();
    };
    const cell = (r, c) => XLSX.utils.encode_cell({
      r,
      c
    });
    const ref = XLSX.utils.decode_range(ws["!ref"]);
    const nickOf = r => {
      const x = V(cell(r, 23)); // X열 배송메세지1
      if (x) return x.split("//")[0].trim(); // "닉네임//요청" → 닉네임
      return V(cell(r, 15)); // P열 고객주문번호 (차선)
    };
    const map = {};
    for (let r = 1; r <= ref.e.r; r++) {
      const nick = nickOf(r);
      if (!nick || nick === "0" || nick.startsWith("#")) continue;
      const tracking = clean(V(cell(r, 5))); // F열 운송장번호
      if (!map[nick]) {
        const c = cust(nick); // 이름·연락처·주소는 앱 출고 데이터 (마스킹 회피)
        map[nick] = {
          nick,
          name: c.name || nick,
          phone: c.phone || "",
          addr: c.addr || "",
          tracking,
          carrier: tracking ? "CJ대한통운" : ""
        };
      } else if (tracking && !map[nick].tracking) {
        map[nick].tracking = tracking;
        map[nick].carrier = "CJ대한통운";
      }
    }
    return Object.values(map);
  };
